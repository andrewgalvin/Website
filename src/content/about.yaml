title: About

lead: >-
  I'm a senior software engineer at Center Stage, a ticket-resale company.
  I build the systems that manage inventory at scale and the monitors that
  find new angles on what to buy and where.

paragraphs:
  - >-
    My own projects taught me production the hard way. Ticket Monitor ran
    at a scale where concurrency, rate limiting, and retries stopped being
    theory, and it's a big part of how I landed this job. eSnipe is live
    today on web, iOS, and Android, and still growing.
  - >-
    I work AI-first. Claude, Cursor, Codex, and ChatGPT are in my daily
    loop for scaffolding, tests, and review. I also build with LLMs
    directly: local-model pipelines with human review where it matters.
    The tools buy speed. The discipline keeps quality and testability
    non-negotiable.
  - >-
    Before this I was at Fidelity, building internal deployment platforms
    and often acting as de facto tech lead. M.S. in Applied Computer
    Science (AI/ML, 4.0 GPA) from Wentworth. Off the clock: portrait
    photography.

