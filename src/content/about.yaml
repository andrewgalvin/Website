principles:
  - title: AI leverage, human judgment
    body: >-
      Assistants accelerate the typing. Design decisions, reviews, and the
      final word on correctness stay human.
  - title: Tests are the contract
    body: >-
      Speed only counts when it's safe to keep. Code that can't prove
      itself doesn't ship.
  - title: Built for production
    body: >-
      Concurrency, rate limits, retries, observability. Designed in from
      day one, not patched in after the incident.
