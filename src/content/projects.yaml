# Projects, in display order.
#
# To add a featured project: append to `featured` with kicker/title/body/
# tags/figure (links optional). To add an earlier project: append to
# `archive` with either a `link` (label + href) or a `note` badge
# (e.g. "Retired", "Private build"). Remove an entry to unpublish it.

title: Projects

featured:
  - kicker: Retired · it landed me my current job
    title: Ticket Monitor
    body: >-
      A distributed monitoring platform that watched event inventory and
      alerted users to in-stock tickets in near real time. Concurrency
      controls, rate limiting, and fault-tolerant retries kept it reliable
      while it processed around 50 million requests a day at peak. Now
      retired, but it opened the door to the work I do today.
    tags:
      - Distributed systems
      - Concurrency
      - Rate limiting
      - Real-time alerting
    figure:
      number: 50M
      caption: requests per day at peak

  - kicker: In production since launch
    title: eSnipe
    body: >-
      An eBay monitoring and alerting platform serving 194 active users,
      with native iOS and Android apps and Discord alerts that land in
      seconds. It tracks 280+ active searches, each polling on a user-chosen
      cadence from every 5 seconds to every 60 minutes, and stays accurate
      inside strict external API limits.
    tags:
      - Production operations
      - API integration
      - Notifications
    links:
      - label: esnipe.app ↗
        href: https://esnipe.app
      - label: App Store ↗
        href: https://apps.apple.com/app/id6758319934
      - label: Google Play ↗
        href: https://play.google.com/store/apps/details?id=com.automate.esnipe.app
    figure:
      number: "194"
      caption: active users today

